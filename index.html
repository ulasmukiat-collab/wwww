<!-- Чат батырмасы -->
<div id="chat-toggle">💬</div>

<!-- Чат терезесі -->
<div id="chat-box">
    <div id="chat-header">AI Чат</div>
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" placeholder="Сұрақ жазыңыз..." />
</div>

<style>
#chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00a8ff;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
}

#chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
}

#chat-header {
    background: #1a2a3a;
    color: white;
    padding: 10px;
    border-radius: 10px 10px 0 0;
}

#chat-messages {
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    font-size: 14px;
}

#chat-input {
    border: none;
    border-top: 1px solid #ccc;
    padding: 10px;
    outline: none;
}
</style>

<script>
const toggle = document.getElementById("chat-toggle");
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("chat-input");
const messages = document.getElementById("chat-messages");

toggle.onclick = () => {
    chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
    chatBox.style.flexDirection = "column";
};

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        let userText = input.value;
        addMessage("Сіз: " + userText);
        input.value = "";

        setTimeout(() => {
            let botReply = getBotReply(userText);
            addMessage("Бот: " + botReply);
        }, 500);
    }
});

function addMessage(text) {
    let div = document.createElement("div");
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// Қарапайым жауап логикасы
function getBotReply(text) {
    text = text.toLowerCase();

    if (text.includes("copilot")) {
        return "GitHub Copilot — кодты автоматты жазуға көмектеседі.";
    } else if (text.includes("chatgpt")) {
        return "ChatGPT — код жазу, түсіндіру және debugging үшін қолданылады.";
    } else if (text.includes("claude")) {
        return "Claude — үлкен кодтарды талдауға өте жақсы.";
    } else if (text.includes("сәлем")) {
        return "Сәлем! Қалай көмектесе аламын?";
    } else {
        return "Кешіріңіз, мен бұл сұрақты түсінбедім 😅";
    }
}
</script>
